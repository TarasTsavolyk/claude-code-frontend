name: Release on CHANGELOG

# When CHANGELOG.md lands on main with a new "## [x.y.z] - date" section,
# tag vX.Y.Z and publish a GitHub Release using that section's notes.
# Idempotent: if the release already exists, it does nothing.

on:
  push:
    branches: [main]
    paths: ["CHANGELOG.md"]

# Least privilege: only what creating a tag + release needs.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve latest released version from CHANGELOG
        id: changelog
        run: |
          set -euo pipefail
          # First versioned heading (skips "## [Unreleased]"), e.g. "## [0.1.0] - 2026-06-10".
          version="$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md \
            | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/' || true)"
          if [ -z "${version}" ]; then
            echo "No released version section found — nothing to do."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Notes = lines between this version's heading and the next "## [" heading.
          awk -v ver="${version}" '
            $0 ~ ("^## \\[" ver "\\]") { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "${RUNNER_TEMP}/release-notes.md"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "Resolved v${version}; notes:"
          cat "${RUNNER_TEMP}/release-notes.md"

      - name: Create tag + release if it does not exist
        if: steps.changelog.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.changelog.outputs.version }}
        run: |
          set -euo pipefail
          # Defence-in-depth: the extraction regex already guarantees this shape.
          [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid version '${VERSION}'"; exit 1; }
          tag="v${VERSION}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists — nothing to do."
            exit 0
          fi
          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${tag}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md"
          echo "Published ${tag}."
